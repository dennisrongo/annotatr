<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Annotatr Overlay</title>
    <style>
      /* Feature #6: Ensure overlay window is transparent */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body {
        margin: 0;
        padding: 0;
      }

      #overlay-root {
        width: 100%;
        height: 100%;
        background: transparent;
      }

      /* Canvas should be transparent and cover entire overlay */
      canvas {
        display: block;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="overlay-root"></div>
    <script type="module" src="/src/overlay-entry.tsx"></script>
  </body>
</html>
